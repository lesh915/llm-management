version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: llm_mgmt
      POSTGRES_USER: llm_mgmt
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_mgmt"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Ollama 초기 모델 다운로드 (최초 1회)
  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Pulling llama3.2:1b (lightweight test model)...' &&
        curl -s -X POST http://ollama:11434/api/pull -d '{\"name\":\"llama3.2:1b\"}' &&
        echo 'Done.'
      "
    restart: "no"

  artifact-service:
    build:
      context: ./services/artifact-service
    environment:
      DATABASE_URL: postgresql+asyncpg://llm_mgmt:password@postgres:5432/llm_mgmt
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: llm-management
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-Zg9_jRkP2vXnQwLmT4sBhC7dEuFyN0aI3oV6pY1cW8=}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/artifact-service:/app

  model-registry-service:
    build:
      context: ./services/model-registry-service
    environment:
      DATABASE_URL: postgresql+asyncpg://llm_mgmt:password@postgres:5432/llm_mgmt
      REDIS_URL: redis://redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-Zg9_jRkP2vXnQwLmT4sBhC7dEuFyN0aI3oV6pY1cW8=}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy

  comparison-engine:
    build:
      context: ./services/comparison-engine
    environment:
      DATABASE_URL: postgresql+asyncpg://llm_mgmt:password@postgres:5432/llm_mgmt
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: llm-management
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      MODEL_REGISTRY_URL: http://model-registry-service:8000
      OLLAMA_BASE_URL: http://ollama:11434
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-Zg9_jRkP2vXnQwLmT4sBhC7dEuFyN0aI3oV6pY1cW8=}
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery worker — comparison task execution
  celery-worker:
    build:
      context: ./services/comparison-engine
    command: >
      celery -A comparison_engine.worker worker
        --loglevel=info
        --concurrency=4
        --queues=celery
    environment:
      DATABASE_URL: postgresql+asyncpg://llm_mgmt:password@postgres:5432/llm_mgmt
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: llm-management
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      MODEL_REGISTRY_URL: http://model-registry-service:8000
      OLLAMA_BASE_URL: http://ollama:11434
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-Zg9_jRkP2vXnQwLmT4sBhC7dEuFyN0aI3oV6pY1cW8=}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Flower — task monitoring UI (optional)
  flower:
    build:
      context: ./services/comparison-engine
    command: >
      celery -A comparison_engine.worker flower
        --port=5555
        --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on: [redis, celery-worker]

volumes:
  postgres_data:
  minio_data:
  ollama_data:
