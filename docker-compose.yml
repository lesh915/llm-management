services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: llm_mgmt
      POSTGRES_USER: llm_mgmt
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_mgmt"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Ollama 초기 모델 다운로드 (최초 1회)
  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Pulling llama3.2:1b (lightweight test model)...' &&
        curl -s -X POST http://ollama:11434/api/pull -d '{\"name\":\"llama3.2:1b\"}' &&
        echo 'Done.'
      "
    restart: "no"

  artifact-service:
    build:
      context: .
      dockerfile: services/artifact-service/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://llm_mgmt:password@postgres:5432/llm_mgmt
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: llm-management
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-Zg9_jRkP2vXnQwLmT4sBhC7dEuFyN0aI3oV6pY1cW8=}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  model-registry-service:
    build:
      context: .
      dockerfile: services/model-registry-service/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://llm_mgmt:password@postgres:5432/llm_mgmt
      REDIS_URL: redis://redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-Zg9_jRkP2vXnQwLmT4sBhC7dEuFyN0aI3oV6pY1cW8=}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy

  comparison-engine:
    build:
      context: .
      dockerfile: services/comparison-engine/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://llm_mgmt:password@postgres:5432/llm_mgmt
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: llm-management
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      MODEL_REGISTRY_URL: http://model-registry-service:8000
      OLLAMA_BASE_URL: http://ollama:11434
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-Zg9_jRkP2vXnQwLmT4sBhC7dEuFyN0aI3oV6pY1cW8=}
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery worker — comparison task execution
  celery-worker:
    build:
      context: .
      dockerfile: services/comparison-engine/Dockerfile
    command: >
      celery -A comparison_engine.worker worker
        --loglevel=info
        --concurrency=4
        --queues=celery
    environment:
      DATABASE_URL: postgresql+asyncpg://llm_mgmt:password@postgres:5432/llm_mgmt
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: llm-management
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      MODEL_REGISTRY_URL: http://model-registry-service:8000
      OLLAMA_BASE_URL: http://ollama:11434
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-Zg9_jRkP2vXnQwLmT4sBhC7dEuFyN0aI3oV6pY1cW8=}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Flower — task monitoring UI (optional)
  flower:
    build:
      context: .
      dockerfile: services/comparison-engine/Dockerfile
    command: >
      celery -A comparison_engine.worker flower
        --port=5555
        --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on: [redis, celery-worker]

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      ARTIFACT_SERVICE_URL: http://artifact-service:8000
      MODEL_REGISTRY_URL: http://model-registry-service:8000
      COMPARISON_ENGINE_URL: http://comparison-engine:8000
      AIOPS_SERVICE_URL: http://aiops-service:8000
      AI_AGENT_RUNNER_URL: http://ai-agent-runner:8000
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - artifact-service
      - model-registry-service
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  aiops-service:
    build:
      context: .
      dockerfile: services/aiops-service/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://llm_mgmt:password@postgres:5432/llm_mgmt
      AI_AGENT_RUNNER_URL: http://ai-agent-runner:8000
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  ai-agent-runner:
    build:
      context: .
      dockerfile: services/ai-agent-runner/Dockerfile
    environment:
      AIOPS_SERVICE_URL: http://aiops-service:8000
      MODEL_REGISTRY_URL: http://model-registry-service:8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NOTIFICATION_WEBHOOK: ${NOTIFICATION_WEBHOOK:-}
    ports:
      - "8005:8000"
    depends_on:
      aiops-service:
        condition: service_healthy

  web:
    build:
      context: ./web
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:8000
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  ollama_data:
