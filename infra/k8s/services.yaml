---
# artifact-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: artifact-service
  namespace: llm-mgmt
  labels:
    app: artifact-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: artifact-service
  template:
    metadata:
      labels:
        app: artifact-service
    spec:
      containers:
        - name: artifact-service
          image: llm-mgmt/artifact-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: llm-mgmt-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: llm-mgmt-secrets
                  key: database-url
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-mgmt-secrets
                  key: encryption-key
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-mgmt-secrets
                  key: s3-access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-mgmt-secrets
                  key: s3-secret-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: artifact-service
  namespace: llm-mgmt
spec:
  selector:
    app: artifact-service
  ports:
    - port: 8000
      targetPort: 8000
