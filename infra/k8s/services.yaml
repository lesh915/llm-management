# comparison-engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comparison-engine
  namespace: llm-mgmt
  labels:
    app: comparison-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comparison-engine
  template:
    metadata:
      labels:
        app: comparison-engine
    spec:
      containers:
        - name: comparison-engine
          image: llm-mgmt/comparison-engine:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: llm-mgmt-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: llm-mgmt-secrets
                  key: database-url
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-mgmt-secrets
                  key: encryption-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-mgmt-secrets
                  key: anthropic-api-key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-mgmt-secrets
                  key: openai-api-key
                  optional: true
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: comparison-engine
  namespace: llm-mgmt
spec:
  selector:
    app: comparison-engine
  ports:
    - port: 8000
      targetPort: 8000
