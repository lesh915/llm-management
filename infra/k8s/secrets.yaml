# 참고: 실제 운영에서는 이 파일을 git에 커밋하지 마세요.
# Sealed Secrets, External Secrets Operator, 또는 Vault를 사용하는 것을 권장합니다.
# 아래는 예시 구조입니다 — 실제 값은 base64 인코딩 필요.
#
# 생성 방법:
#   kubectl create secret generic llm-mgmt-secrets \
#     --from-literal=database-url="postgresql+asyncpg://..." \
#     --from-literal=encryption-key="..." \
#     --from-literal=jwt-secret="..." \
#     --from-literal=anthropic-api-key="sk-ant-..." \
#     --from-literal=openai-api-key="sk-..." \
#     --from-literal=s3-access-key="..." \
#     --from-literal=s3-secret-key="..." \
#     -n llm-mgmt --dry-run=client -o yaml > secrets.yaml

apiVersion: v1
kind: Secret
metadata:
  name: llm-mgmt-secrets
  namespace: llm-mgmt
type: Opaque
data:
  # base64 encoded values — replace with actual values
  # echo -n "value" | base64
  database-url:       <BASE64_ENCODED_DATABASE_URL>
  encryption-key:     <BASE64_ENCODED_ENCRYPTION_KEY>
  jwt-secret:         <BASE64_ENCODED_JWT_SECRET>
  gateway-api-key:    <BASE64_ENCODED_GATEWAY_API_KEY>
  anthropic-api-key:  <BASE64_ENCODED_ANTHROPIC_API_KEY>
  openai-api-key:     <BASE64_ENCODED_OPENAI_API_KEY>
  s3-access-key:      <BASE64_ENCODED_S3_ACCESS_KEY>
  s3-secret-key:      <BASE64_ENCODED_S3_SECRET_KEY>
