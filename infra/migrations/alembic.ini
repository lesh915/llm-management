# Alembic 설정 파일
# 사용법: alembic -c infra/migrations/alembic.ini upgrade head

[alembic]
script_location = %(here)s
prepend_sys_path = .

# DATABASE_URL은 env.py에서 환경 변수로 읽음
# 로컬 실행 시: export DATABASE_URL=postgresql+asyncpg://llm_mgmt:password@localhost:5432/llm_mgmt

file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 40

[post_write_hooks]
# 마이그레이션 파일 자동 포맷팅 (선택사항)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamingHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
